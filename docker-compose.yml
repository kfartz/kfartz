services:
  kfartz:
    image: ghcr.io/kfartz/kfartz:latest
    ports:
      - 3000:3000
    networks:
      - kfartz
    env_file: .env-docker
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18.1-alpine
    volumes:
      - kfartz-data:/var/lib/postgresql/data
    networks:
      - kfartz
    env_file: .env-docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  kfartz-data:

networks:
  kfartz: {}
